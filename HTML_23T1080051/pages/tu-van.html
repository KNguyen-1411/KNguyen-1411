<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chương trình đào tạo</title>
    <style>
        .main{
            font-size: 24px;
            margin: auto;
            padding: 20px;
        }
        .cauhoi{
            font-size: 18px;
            padding: 15px;
        }
        .cauhoi input,.sl{
            padding: 5px;
            border: solid 1px ;
            border-radius: 2px;
            margin-bottom: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="main" style="border: solid 2px rgb(63, 100, 223); width: 60%;">
        <h1 style="font-size: 26px; color:rgb(63, 100, 223);">HỎI ĐÁP TƯ VẤN TUYỂN SINH</h1>
        <hr>
        <div class="cauhoi">
            <fieldset>
                <legend >Liên hệ hỏi đáp tư vấn tuyển sinh</legend>
                <table>
                    <tr>
                        <td>Họ và tên:</td>
                        <td><input style="width:100%;" type="text"> </td>
                    </tr>
                    <tr>
                        <td>Giới tính:</td>
                        <td>
                            <input type="radio" name="gender" value="male" checked> Nam
                            <input type="radio" name="gender" value="female"> Nữ
                        </td>
                    </tr>
                    <tr>
                        <td>Email:</td>
                        <td><input style="width:100%;" type="text"></td>
                    </tr>
                    <tr>
                        <td>Di động:</td>
                        <td><input style="width:100%;" type="text"></td>
                    </tr>
                    <tr>
                        <td><label >Nghành học bạn quan tâm: </label></td>
                        <td><select class="sl">
                            <option value="cntt">Công nghệ thông tin</option>
                            <option value="bc">Báo chí</option>
                            <option value="kt">Kiến trúc</option>
                          </select>
                        </td>
                    </tr>
                    <tr>
                        <td>Câu hỏi của bạn là gì?</td>
                        <td><input style="padding: 20px; " type="text"><br></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><input type="radio" value="question"> Tôi xác nhận thông tin trên là đúng</td>
                    </tr>
                    <tr>
                        <td></td>
                        <td>
                            <button style="height: 25px;">Gửi câu hỏi</button>
                            <button style="height: 25px;">Xóa from</button>
                        </td>
                        
                    </tr>
                </table>
            </fieldset>
            
        </div>
    </div>
</body>
</html>
